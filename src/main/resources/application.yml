server:
  port: 8080

spring:
  application:
    name: camel-route-tracer
  servlet:
    multipart:
      # Output logs / Splunk exports can be very large and are often uploaded in several chunks
      # (each may exceed 200 MB). max-file-size caps a single chunk; max-request-size caps the whole
      # upload (sum of all chunks). Large parts are spooled to a temp file, so memory stays bounded.
      max-file-size: 1GB
      max-request-size: 6GB
      file-size-threshold: 2MB

# Framework source directory to analyse. No default — set it to your framework
# checkout via the TRACER_SOURCE_DIR environment variable, or supply it per
# request via the 'sourceDir' field/param. A blank value yields a clear 400.
tracer:
  source-dir: ${TRACER_SOURCE_DIR:}

# Bitbucket source mode: when a tab is set to "Bitbucket branch", the server clones the
# given HTTPS repo + branch (via JGit) into a cache dir and analyses that. Provide your
# internal Bitbucket HTTP access token (Read scope) either via the BITBUCKET_TOKEN
# environment variable (preferred — no secret in the repo) or by replacing ${BITBUCKET_TOKEN:}
# with the literal token below. If pasting the token inline, QUOTE it ("...") when it has
# special characters. The app reads this at startup — RESTART after changing it.
bitbucket:
  token: ${BITBUCKET_TOKEN:}
  # Where cloned repos are cached on the server. Blank = <java.io.tmpdir>/traceguard-repos.
  work-dir: ${BITBUCKET_WORK_DIR:}

logging:
  level:
    com.uob.tracer: INFO
    # Each XML file is parsed in a throwaway CamelContext; silence its lifecycle chatter.
    org.apache.camel: WARN
